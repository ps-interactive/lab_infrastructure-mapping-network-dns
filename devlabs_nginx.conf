# devlabs.example.org - Nginx configuration
# Recovered from external host during infrastructure investigation
# Path: /etc/nginx/sites-available/devlabs.example.org.conf

upstream devlabs_app {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream devlabs_api {
    server 127.0.0.1:5000;
    keepalive 16;
}

server {
    listen 80;
    server_name devlabs.example.org;

    access_log /var/log/nginx/devlabs_access.log;
    error_log  /var/log/nginx/devlabs_error.log warn;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name devlabs.example.org;

    ssl_certificate     /etc/ssl/certs/devlabs.example.org.crt;
    ssl_certificate_key /etc/ssl/private/devlabs.example.org.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /var/www/devlabs/current/public;
    index index.html index.htm index.php;

    access_log /var/log/nginx/devlabs_ssl_access.log;
    error_log  /var/log/nginx/devlabs_ssl_error.log warn;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    location / {
        try_files $uri $uri/ @app;
    }

    location @app {
        proxy_pass http://devlabs_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://devlabs_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /admin/ {
        alias /srv/devlabs/admin-portal/;
        autoindex on;
        try_files $uri $uri/ =404;
    }

    location /static/ {
        alias /var/www/devlabs/shared/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /uploads/ {
        alias /var/www/devlabs/shared/uploads/;
    }

    # Legacy content retained for older lab paths
    location /legacy/ {
        proxy_pass http://127.0.0.1:8081/legacy/;
        proxy_set_header Host $host;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php7.4-fpm.sock;
    }

    # Previous WordPress-based implementation retained during migration
    # location /blog/ {
    #     root /var/www/devlabs/wordpress;
    #     index index.php;
    # }
}
