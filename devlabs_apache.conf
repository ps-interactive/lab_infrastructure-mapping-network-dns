# devlabs.example.org - Apache legacy application configuration
# Recovered from external host during infrastructure investigation
# Path: /etc/apache2/sites-available/devlabs-legacy.conf

<VirtualHost *:8081>
    ServerName devlabs.example.org
    ServerAdmin webmaster@example.org

    DocumentRoot /opt/devlabs/legacy_portal
    DirectoryIndex index.php index.html

    ErrorLog ${APACHE_LOG_DIR}/devlabs_legacy_error.log
    CustomLog ${APACHE_LOG_DIR}/devlabs_legacy_access.log combined

    <Directory /opt/devlabs/legacy_portal>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    Alias /legacy-assets /opt/devlabs/legacy_assets
    <Directory /opt/devlabs/legacy_assets>
        Options Indexes MultiViews
        Require all granted
    </Directory>

    ProxyPreserveHost On

    # Legacy PHP application
    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/run/php/php7.4-fpm.sock|fcgi://localhost/"
    </FilesMatch>

    # Older admin tooling retained for internal training use
    Alias /tools /opt/devlabs/tools
    <Directory /opt/devlabs/tools>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Historical application path
    RedirectMatch 302 ^/old-dashboard/?$ /legacy/dashboard/

    Header always set X-Powered-By "PHP/7.4"
</VirtualHost>
